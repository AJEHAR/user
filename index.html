<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ptracker">
  <meta name="application-name" content="ptracker">
  <meta name="theme-color" content="#f9a8b8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>ptracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #fdf6f0;
      overflow: hidden;
      touch-action: manipulation;
      font-family: sans-serif;
    }

    /* ── Splash screen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(160deg, #fdf6f0 0%, #fce4ec 100%);
      transition: opacity 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid #f9a8b8;
      object-fit: cover;
      animation: pulse 2s ease-in-out infinite;
    }
    #splash h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      color: #c2677a;
      letter-spacing: 0.04em;
    }
    #splash p {
      margin: 0;
      font-size: 0.85rem;
      color: #b08a95;
    }
    .dots {
      display: flex;
      gap: 7px;
    }
    .dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f9a8b8;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249,168,184,0.4); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(249,168,184,0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── iframe ── */
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="icon-192.png" alt="ptracker">
    <h1>ptracker</h1>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
    <p>Memuatkan...</p>
  </div>

  <!-- App iframe — URL disimpan dalam config, bukan hardcode -->
  <iframe id="appFrame" src="" allowfullscreen
    allow="camera; microphone; clipboard-write"></iframe>

  <script>
    // ── App config ──────────────────────────────────────────────
    // URL dikodkan supaya tidak terdedah secara langsung dalam source
    // Ini bukan enkripsi penuh, tapi menghalang pencarian mudah dalam repo
    const _c = [
      'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9hL21hY3Jvcy9tb2UtZGwuZWR1Lm15L3MvQUtmeWNieDNXckVtTzZhUzdENV9VOF9YX2V4Ty00WTZwbG9XYmxEeXRnb1g1U25iNUh1V0xYQTBaelotQmV1Qk1LZkdkZGgvZXhlYw=='
    ];
    const _url = atob(_c[0]);

    // Set iframe src
    const frame = document.getElementById('appFrame');
    frame.src = _url;

    // Hide splash once iframe loads
    frame.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        setTimeout(() => {
          document.getElementById('splash').remove();
        }, 600);
      }, 400);
    });

    // Fallback: hide splash after 8s regardless
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) s.classList.add('hide');
    }, 8000);

    // ── Service Worker ───────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ptracker/sw.js')
          .then(r => console.log('[ptracker] SW registered:', r.scope))
          .catch(e => console.warn('[ptracker] SW failed:', e));
      });
    }

    // ── PWA install prompt ───────────────────────────────────────
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
    });
  </script>
</body>
</html>
